<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#F8F8F6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="George Habits">
<title>George Habits</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#F8F8F6;--card:#FFFFFF;--cardBorder:rgba(0,0,0,0.06);
--text:#1A1A1A;--textSec:#6B7280;--textTer:#9CA3AF;
--accent:#059669;--accentLight:rgba(5,150,105,0.08);
--check:#059669;--checkBg:rgba(5,150,105,0.1);
--ring:#E5E7EB;--danger:#DC2626;--warn:#D97706;--warnBg:rgba(245,158,11,0.08);
--shadow:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.03);
}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.container{max-width:480px;margin:0 auto;padding:0 16px 100px}
@media(min-width:720px){.container{max-width:960px;padding:0 32px 60px}}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* Header */
.header{padding:20px 0 0;display:flex;align-items:center;justify-content:space-between}
.title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.subtitle{font-size:12px;color:var(--textTer);margin-top:2px}
.badge{background:var(--accentLight);border:1px solid rgba(5,150,105,0.18);border-radius:10px;padding:6px 14px;color:var(--accent);font-size:12px;font-weight:600}

/* Tabs */
.tabs{display:flex;gap:6px;padding:16px 0 0}
.tab{flex:1;padding:11px 0;border-radius:12px;font-weight:700;font-size:13px;letter-spacing:0.3px;transition:all 0.2s;border:1.5px solid var(--cardBorder);background:transparent;color:var(--textTer)}
.tab.active{background:var(--card);color:var(--accent);border-color:var(--accent);box-shadow:0 2px 8px rgba(5,150,105,0.1)}

/* Date nav */
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0}
.nav-btn{background:var(--card);border:1px solid var(--cardBorder);border-radius:8px;padding:6px 12px;color:var(--textSec);font-size:14px;box-shadow:var(--shadow)}
.date-label{font-size:15px;font-weight:600;text-align:center}

/* Progress */
.progress-row{display:flex;align-items:center;gap:14px;padding-bottom:18px}
.done-count{font-size:22px;font-weight:700}
.done-label{font-size:12px;color:var(--textTer)}
.edit-btn{background:rgba(0,0,0,0.03);border:1px solid var(--cardBorder);border-radius:6px;padding:6px 14px;font-size:12px;color:var(--textSec)}
.edit-btn.active{background:var(--warnBg);color:var(--warn);border-color:rgba(245,158,11,0.2)}

/* Sections */
.section{margin-bottom:18px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.section-title{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.section-count{font-size:10px;color:var(--textTer);font-weight:500;letter-spacing:0}
.add-btn{font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid}

/* Habit rows */
.habit-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:10px;border:1px solid var(--cardBorder);background:var(--card);box-shadow:var(--shadow);transition:all 0.15s;margin-bottom:6px}
.habit-row.done{background:var(--checkBg);border-color:rgba(5,150,105,0.18);box-shadow:none}
.checkbox{width:24px;height:24px;border-radius:7px;border:2px solid #D1D5DB;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.checkbox.checked{border-color:var(--check);background:var(--check)}
.habit-emoji{font-size:18px;flex-shrink:0}
.habit-name{flex:1;font-size:14px;font-weight:500;transition:all 0.15s}
.habit-row.done .habit-name{color:var(--textSec);text-decoration:line-through}
.tiny-btn{background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.06);border-radius:6px;padding:4px 8px;font-size:12px}

/* Card */
.card{background:var(--card);border-radius:14px;padding:20px;border:1px solid var(--cardBorder);margin-bottom:16px;box-shadow:var(--shadow)}

/* Milestone dots */
.milestones{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.milestone-dot{width:28px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all 0.3s}
.milestone-label{font-size:9px;font-weight:600;margin-top:3px}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px}
.cal-day-name{text-align:center;font-size:10px;color:var(--textTer);padding:2px 0}
.cal-compact .cal-cell{border-radius:2px}

/* Streak rows */
.streak-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.streak-bar-outer{width:60px;height:5px;border-radius:3px;background:var(--ring);overflow:hidden;flex-shrink:0}
.streak-bar-inner{height:100%;border-radius:3px;transition:width 0.3s}

/* Weekly scorecard */
.week-card{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;margin-bottom:8px}
.week-bar-outer{height:6px;border-radius:3px;background:var(--ring);overflow:hidden}
.week-bar-inner{height:100%;border-radius:3px;transition:width 0.3s}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-input{background:#F3F4F6;border:1px solid #E5E7EB;border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;width:100%}
.modal-input.emoji{width:56px;text-align:center;font-size:20px}
.btn-cancel{padding:8px 16px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;color:var(--textSec);font-size:13px}
.btn-confirm{padding:8px 16px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600}

/* Desktop grid */
@media(min-width:720px){
  .desktop-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
  .desktop-col{border-radius:14px;padding:16px}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .cal-year-grid{grid-template-columns:repeat(4,1fr)!important}
}
.cal-month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.cal-year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* Scrollable chart */
.chart-scroll{overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}

/* Hide scrollbar but keep scroll */
.chart-scroll::-webkit-scrollbar{height:4px}
.chart-scroll::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:2px}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="container" id="app"></div>

<script>
// ═══════════════════════════════════════════
// DATA & CONFIG
// ═══════════════════════════════════════════
const DEFAULT_HABITS=[
{id:"h1",name:"Levantarme <5am",emoji:"⏰",section:"am",order:0},
{id:"h2",name:"Baño agua fría 1' + Dientes",emoji:"❄️",section:"am",order:1},
{id:"h3",name:"Estiramiento",emoji:"🧘",section:"am",order:2},
{id:"h4",name:"Meditación 10'",emoji:"🧘‍♂️",section:"am",order:3},
{id:"h21",name:"Breathwork 10'",emoji:"🌬️",section:"am",order:4},
{id:"h5",name:"Ejercicio",emoji:"🏋️",section:"am",order:5},
{id:"h18",name:"Lectura 10 págs",emoji:"📚",section:"am",order:6},
{id:"h19",name:"Noticias Negocios",emoji:"💰",section:"am",order:7},
{id:"h6",name:"Día Productivo Oficina",emoji:"📈",section:"oficina",order:0},
{id:"h8",name:"Video / Artículo AI",emoji:"🤖",section:"oficina",order:1},
{id:"h9",name:"Noticias AI",emoji:"🗞️",section:"oficina",order:2},
{id:"h11",name:"2 lts agua al día",emoji:"💧",section:"pm",order:0},
{id:"h12",name:"No apostar",emoji:"🚫",section:"pm",order:1},
{id:"h13",name:"No café",emoji:"☕",section:"pm",order:2},
{id:"h14",name:"No azúcar, harinas, gluten",emoji:"🍞",section:"pm",order:3},
{id:"h22",name:"No alcohol",emoji:"🍷",section:"pm",order:4},
{id:"h15",name:"Máx 10' social media",emoji:"📱",section:"pm",order:5},
{id:"h20",name:"Lectura 10 págs",emoji:"📖",section:"pm",order:6},
{id:"h17",name:"Acostado listo antes de las 9",emoji:"🌙",section:"pm",order:7}
];

const SECTIONS={
am:{label:"MAÑANA",icon:"☀️",color:"#D97706",bg:"rgba(217,119,6,0.07)",border:"rgba(217,119,6,0.18)"},
oficina:{label:"OFICINA",icon:"💼",color:"#059669",bg:"rgba(5,150,105,0.07)",border:"rgba(5,150,105,0.18)"},
pm:{label:"NOCHE",icon:"🌙",color:"#4F46E5",bg:"rgba(79,70,229,0.07)",border:"rgba(79,70,229,0.18)"}
};

const MILESTONES=[30,60,90,120];
const dayNames=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const monthNames=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const monthFull=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

// ═══ Helpers ═══
const fmt=d=>d.toISOString().split("T")[0];
const today=()=>fmt(new Date());
const parseDate=s=>{const[y,m,d]=s.split("-");return new Date(y,m-1,d)};
const genId=()=>"h"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const isWide=()=>window.innerWidth>=720;

function load(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.error(e)}}

function barColor(p){if(p<=0)return"rgba(0,0,0,0.06)";if(p<60)return"#DC2626";if(p<80)return"#D97706";if(p<100)return"#059669";return"#047857"}
function heatColor(p){if(p<=0)return"rgba(0,0,0,0.03)";if(p<60)return"rgba(220,38,38,0.35)";if(p<80)return"rgba(245,158,11,0.40)";if(p<100)return"rgba(5,150,105,0.40)";return"rgba(5,120,85,0.75)"}
function getMilestone(streak){for(const m of MILESTONES)if(streak<m)return m;return MILESTONES[MILESTONES.length-1]}

function calcStreak(hid,comp){
  let s=0;const d=new Date();
  if(!comp[fmt(d)]?.[hid])d.setDate(d.getDate()-1);
  while(comp[fmt(d)]?.[hid]){s++;d.setDate(d.getDate()-1)}
  return s;
}
function calcGlobal(comp,habits,th=80){
  let s=0;const d=new Date();
  const ck=dt=>{const dd=comp[fmt(dt)];if(!dd||!habits.length)return false;return(habits.filter(h=>dd[h.id]).length/habits.length)*100>=th};
  if(!ck(d))d.setDate(d.getDate()-1);
  while(ck(d)){s++;d.setDate(d.getDate()-1)}
  return s;
}
function getDayPct(ds,comp,habits){const d=comp[ds];if(!d||!habits.length)return 0;return(habits.filter(h=>d[h.id]).length/habits.length)*100}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state={
  habits:load("ht-habits",null)||[...DEFAULT_HABITS],
  completions:load("ht-completions",{}),
  selectedDate:today(),
  view:"today",
  editMode:false,
  modal:null,
  calMode:"month",
  calMonth:new Date().getMonth(),
  calYear:new Date().getFullYear(),
  calQuarter:Math.ceil((new Date().getMonth()+1)/3),
  chartRange:30,
  showDemo:false
};

function setState(patch){Object.assign(state,patch);render()}

// ═══════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════
const $=id=>document.getElementById(id);
const app=document.getElementById("app");

function render(){
  const{habits,completions,selectedDate,view,editMode}=state;
  const dd=completions[selectedDate]||{};
  const doneCount=habits.filter(h=>dd[h.id]).length;
  const pct=habits.length?(doneCount/habits.length)*100:0;
  const dateObj=parseDate(selectedDate);
  const isT=selectedDate===today();
  const gs=calcGlobal(completions,habits);
  const goal=getMilestone(gs);

  let html=`
  <div class="header">
    <div><div class="title">George Habits</div>
    <div class="subtitle">${gs>0?`🔥 Racha global: ${gs} días`:"Empieza tu racha hoy"}</div></div>
    <div class="badge">🎯 ${goal}d</div>
  </div>
  <div class="tabs">
    <button class="tab ${view==="today"?"active":""}" onclick="setState({view:'today',editMode:false})">☀️ Hoy</button>
    <button class="tab ${view==="stats"?"active":""}" onclick="setState({view:'stats',editMode:false})">📊 Stats</button>
    <button class="tab ${view==="charts"?"active":""}" onclick="setState({view:'charts',editMode:false})">📈 Gráficas</button>
  </div>`;

  if(view==="today") html+=renderToday(dd,doneCount,pct,dateObj,isT,editMode);
  else if(view==="stats") html+=renderStats(gs,goal);
  else html+=renderCharts();

  app.innerHTML=html;
}

// ═══ TODAY VIEW ═══
function renderToday(dd,doneCount,pct,dateObj,isT,editMode){
  const{habits,selectedDate}=state;
  const pctColor=pct>=80?"var(--accent)":pct>=50?"var(--warn)":"var(--danger)";

  let h=`
  <div class="date-nav">
    <button class="nav-btn" onclick="changeDate(-1)">←</button>
    <div class="date-label">${isT?"Hoy":dayNames[dateObj.getDay()]} — ${dateObj.getDate()} ${monthFull[dateObj.getMonth()]}</div>
    <button class="nav-btn" style="opacity:${isT?0.3:1};pointer-events:${isT?"none":"auto"}" onclick="changeDate(1)">→</button>
  </div>
  <div class="progress-row">
    ${renderCircle(pct,56,5)}
    <div style="flex:1"><div class="done-count">${doneCount}/${habits.length}</div><div class="done-label">hábitos completados</div></div>
    <button class="edit-btn ${editMode?"active":""}" onclick="setState({editMode:${!editMode}})">${editMode?"✓ Listo":"Editar"}</button>
  </div>`;

  ["am","oficina","pm"].forEach(sec=>{
    const s=SECTIONS[sec];
    const sh=habits.filter(x=>x.section===sec).sort((a,b)=>a.order-b.order);
    const secDone=sh.filter(x=>dd[x.id]).length;
    h+=`<div class="section">
      <div class="section-header">
        <div class="section-title" style="color:${s.color}">${s.icon} ${s.label} <span class="section-count">${secDone}/${sh.length}</span></div>
        ${editMode?`<button class="add-btn" style="color:${s.color};background:${s.bg};border-color:${s.border}" onclick="openAdd('${sec}')">+ Agregar</button>`:""}
      </div>`;
    sh.forEach(hab=>{
      const done=!!dd[hab.id];
      h+=`<div class="habit-row ${done?"done":""}" ${!editMode?`onclick="toggleHabit('${hab.id}')"`:""}>
        ${!editMode?`<div class="checkbox ${done?"checked":""}">${done?'<span style="color:#fff;font-size:13px;font-weight:800">✓</span>':""}</div>`:""}
        <span class="habit-emoji">${hab.emoji}</span>
        <span class="habit-name">${hab.name}</span>
        ${editMode?`<button class="tiny-btn" onclick="openEdit('${hab.id}')">✏️</button><button class="tiny-btn" style="background:rgba(220,38,38,0.08)" onclick="deleteHabit('${hab.id}')">🗑️</button>`:""}
      </div>`;
    });
    h+=`</div>`;
  });
  return h;
}

function renderCircle(pct,size,stroke){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(pct/100)*circ;
  const color=pct>=80?"var(--accent)":pct>=50?"var(--warn)":"var(--danger)";
  return`<svg width="${size}" height="${size}" style="transform:rotate(-90deg);flex-shrink:0">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--ring)" stroke-width="${stroke}"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" style="transition:stroke-dashoffset 0.4s"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central" fill="${color}" font-size="${size*0.24}" font-weight="700" style="transform:rotate(90deg);transform-origin:center">${Math.round(pct)}%</text>
  </svg>`;
}

// ═══ STATS VIEW ═══
function renderStats(gs,goal){
  const{habits,completions,calMode,calMonth,calYear,calQuarter}=state;
  let h=`<div style="padding:16px 0 40px">`;

  // Goal panel with milestones
  h+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:14px;font-weight:600">🎯 Meta: ${goal} días</span>
      <span style="font-size:22px;font-weight:700;color:var(--accent)">${gs}<span style="font-size:14px;font-weight:500;color:var(--textTer)">/${goal}</span></span>
    </div>
    <div style="height:8px;border-radius:4px;background:var(--ring);overflow:hidden">
      <div style="height:100%;border-radius:4px;background:linear-gradient(90deg,#059669,#34d399);width:${Math.min(100,(gs/goal)*100)}%;transition:width 0.4s"></div>
    </div>
    <div class="milestones">`;
  MILESTONES.forEach((m,i)=>{
    const achieved=gs>=m,current=goal===m&&!achieved;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
      <div class="milestone-dot" style="background:${achieved?"var(--accent)":current?"var(--warnBg)":"rgba(0,0,0,0.04)"};border:${current?"2px solid var(--warn)":achieved?"2px solid transparent":"1.5px solid var(--ring)"};color:${achieved?"#fff":current?"var(--warn)":"var(--textTer)"}">${achieved?"✓":i+1}</div>
      <span class="milestone-label" style="color:${achieved?"var(--accent)":current?"var(--warn)":"var(--textTer)"}">${m}d</span>
    </div>`;
  });
  h+=`</div>
    <div style="font-size:11px;color:var(--textTer);margin-top:8px;text-align:center">${gs>=MILESTONES[MILESTONES.length-1]?"🏆 ¡Todos los milestones alcanzados!":`Faltan ${goal-gs} días para el siguiente nivel (≥80% diario)`}</div>
  </div>`;

  // Calendar
  h+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;gap:2px;background:rgba(0,0,0,0.04);border-radius:8px;padding:2px">
        ${["month","quarter","year"].map((k,i)=>`<button style="padding:4px 10px;border-radius:6px;border:none;cursor:pointer;background:${calMode===k?"#fff":"transparent"};color:${calMode===k?"var(--text)":"var(--textTer)"};font-size:11px;font-weight:600;font-family:inherit;box-shadow:${calMode===k?"0 1px 2px rgba(0,0,0,0.08)":"none"}" onclick="setState({calMode:'${k}'})">${["Mes","Trim","Año"][i]}</button>`).join("")}
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <button class="nav-btn" onclick="calNav(-1)">←</button>
        <span style="font-size:13px;font-weight:600;min-width:90px;text-align:center">${calMode==="month"?`${monthFull[calMonth]} ${calYear}`:calMode==="quarter"?`Q${calQuarter} ${calYear}`:`${calYear}`}</span>
        <button class="nav-btn" onclick="calNav(1)">→</button>
      </div>
    </div>`;

  if(calMode==="month") h+=renderMonthCal(calMonth,calYear,false);
  else if(calMode==="quarter"){
    const sm=(calQuarter-1)*3;
    h+=`<div class="cal-month-grid">${[0,1,2].map(o=>`<div><div style="font-size:11px;font-weight:600;color:var(--textSec);margin-bottom:6px;text-align:center">${monthNames[sm+o]}</div>${renderMonthCal(sm+o,calYear,true)}</div>`).join("")}</div>`;
  }else{
    h+=`<div class="cal-year-grid">${Array.from({length:12},(_,m)=>`<div><div style="font-size:11px;font-weight:600;color:var(--textSec);margin-bottom:6px;text-align:center">${monthNames[m]}</div>${renderMonthCal(m,calYear,true)}</div>`).join("")}</div>`;
  }
  h+=`<div style="display:flex;gap:8px;margin-top:10px;justify-content:center;flex-wrap:wrap">${[["<60%","rgba(220,38,38,0.35)"],["60-79%","rgba(245,158,11,0.40)"],["80-99%","rgba(5,150,105,0.40)"],["100%","rgba(5,120,85,0.75)"]].map(([l,c])=>`<div style="display:flex;align-items:center;gap:3px;font-size:9px;color:var(--textTer)"><div style="width:10px;height:10px;border-radius:2px;background:${c}"></div>${l}</div>`).join("")}</div>`;
  h+=`</div>`;

  // Streaks
  h+=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:14px">🔥 Rachas por hábito</div>`;
  ["am","oficina","pm"].forEach(sec=>{
    const s=SECTIONS[sec];
    const sh=habits.filter(x=>x.section===sec).sort((a,b)=>a.order-b.order);
    h+=`<div style="margin-bottom:14px"><div style="font-size:10px;font-weight:700;color:${s.color};letter-spacing:1px;margin-bottom:6px;text-transform:uppercase">${s.icon} ${s.label}</div>`;
    sh.forEach(hab=>{
      const st=calcStreak(hab.id,completions);
      const sp=goal>0?Math.min(100,(st/goal)*100):0;
      h+=`<div class="streak-row">
        <span style="font-size:14px;width:20px;text-align:center">${hab.emoji}</span>
        <span style="font-size:12px;color:var(--textSec);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${hab.name}</span>
        <div class="streak-bar-outer"><div class="streak-bar-inner" style="background:${s.color};width:${sp}%"></div></div>
        <span style="font-size:12px;font-weight:700;color:${st>0?s.color:"var(--textTer)"};min-width:28px;text-align:right">${st}d</span>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`</div></div>`;
  return h;
}

function renderMonthCal(month,year,compact){
  const{habits,completions}=state;
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const todayStr=today();
  const sz=compact?14:28;
  let h="";
  if(!compact) h+=`<div class="cal-grid" style="margin-bottom:2px">${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join("")}</div>`;
  h+=`<div class="cal-grid ${compact?"cal-compact":""}">`;
  for(let i=0;i<first;i++) h+=`<div class="cal-cell" style="width:${sz}px;height:${sz}px"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const p=getDayPct(ds,completions,habits);
    const isT=ds===todayStr;
    h+=`<div class="cal-cell" style="width:${sz}px;height:${sz}px;background:${heatColor(p)};color:${p>=80?"#065F46":"var(--textTer)"};font-weight:${isT?700:400};border:${isT?"1.5px solid var(--accent)":"none"};font-size:${compact?0:9}px" title="${ds}: ${Math.round(p)}%">${compact?"":d}</div>`;
  }
  h+=`</div>`;
  return h;
}

// ═══ CHARTS VIEW ═══
function renderCharts(){
  const{habits,completions,chartRange:range,showDemo}=state;
  const data=[];
  const d=new Date();
  for(let i=range-1;i>=0;i--){
    const dt=new Date(d);dt.setDate(dt.getDate()-i);
    const key=fmt(dt);const dd=completions[key];
    let pct=dd&&habits.length?Math.round((habits.filter(h=>dd[h.id]).length/habits.length)*100):0;
    if(showDemo){pct=Math.max(15,Math.min(100,Math.round(80+Math.sin(i*0.7)*12+Math.cos(i*1.3)*8)))}
    data.push({date:key,dayNum:dt.getDate(),monthLabel:monthNames[dt.getMonth()],fullLabel:`${dayNames[dt.getDay()]} ${dt.getDate()} ${monthNames[dt.getMonth()]}`,pct,isFirst:dt.getDate()===1});
  }
  // Moving average
  data.forEach((d,i)=>{const w=data.slice(Math.max(0,i-6),i+1);d.ma7=Math.round(w.reduce((s,x)=>s+x.pct,0)/w.length)});
  // Weekly
  const weeks=[];
  for(let i=0;i<data.length;i+=7){
    const ch=data.slice(i,i+7);
    const avg=ch.length?Math.round(ch.reduce((s,x)=>s+x.pct,0)/ch.length):0;
    const dg=ch.filter(x=>x.pct>=80).length;
    weeks.push({range:`${ch[0].dayNum} ${ch[0].monthLabel} – ${ch[ch.length-1].dayNum} ${ch[ch.length-1].monthLabel}`,avg,daysGreen:dg,total:ch.length});
  }

  const wide=isWide();
  const barW=wide?18:12,gap=wide?3:2;
  const chartW=data.length*(barW+gap)+60;

  let h=`<div style="padding:16px 0 40px">`;
  // Controls
  h+=`<div class="card" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <span style="font-size:14px;font-weight:600">📈 Periodo</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button style="padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;font-family:inherit;background:${showDemo?"rgba(99,102,241,0.1)":"rgba(0,0,0,0.03)"};color:${showDemo?"#4F46E5":"var(--textTer)"};border:${showDemo?"1px solid rgba(99,102,241,0.25)":"1px solid var(--cardBorder)"}" onclick="setState({showDemo:${!showDemo}})">${showDemo?"✓ Demo":"Demo"}</button>
      <div style="display:flex;gap:2px;background:rgba(0,0,0,0.04);border-radius:8px;padding:2px">
        ${[30,60,90].map(v=>`<button style="padding:5px 12px;border-radius:6px;border:none;font-size:12px;font-weight:600;font-family:inherit;background:${range===v?"#fff":"transparent"};color:${range===v?"var(--text)":"var(--textTer)"};box-shadow:${range===v?"0 1px 2px rgba(0,0,0,0.08)":"none"};cursor:pointer" onclick="setState({chartRange:${v}})">${v}d</button>`).join("")}
      </div>
    </div>
  </div>`;

  if(showDemo) h+=`<div style="background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.15);border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#4F46E5;display:flex;align-items:center;gap:8px">💡 Modo demo — datos simulados (~80% promedio).</div>`;

  // Daily bars
  h+=`<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:2px">Cumplimiento diario</div>
    <div style="font-size:11px;color:var(--textTer);margin-bottom:12px">Cada barra = 1 día. Color según tu % de hábitos completados.</div>
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">${[["< 60%","#DC2626"],["60–79%","#D97706"],["80–99%","#059669"],["100%","#047857"]].map(([l,c])=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--textSec)"><div style="width:10px;height:10px;border-radius:2px;background:${c}"></div>${l}</div>`).join("")}<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--textSec)"><div style="width:16px;height:0;border-top:2px dashed #059669"></div>Meta 80%</div></div>
    <div class="chart-scroll"><svg width="${Math.max(chartW,300)}" height="200">`;
  [0,20,40,60,80,100].forEach(v=>{const y=160-(v/100)*140;h+=`<line x1="40" y1="${y}" x2="${chartW-10}" y2="${y}" stroke="rgba(0,0,0,0.05)"/><text x="36" y="${y+3}" text-anchor="end" font-size="9" fill="var(--textTer)">${v}%</text>`});
  h+=`<line x1="40" y1="${160-(80/100)*140}" x2="${chartW-10}" y2="${160-(80/100)*140}" stroke="#059669" stroke-dasharray="6 3" stroke-width="1.5"/>`;
  data.forEach((d,i)=>{const x=44+i*(barW+gap),barH=Math.max(1,(d.pct/100)*140),y=160-barH;h+=`<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="2" fill="${barColor(d.pct)}" opacity="0.85"/><text x="${x+barW/2}" y="174" text-anchor="middle" font-size="${wide?8:7}" fill="var(--textTer)">${d.dayNum}</text>`;if(d.isFirst||i===0)h+=`<text x="${x+barW/2}" y="190" text-anchor="middle" font-size="8" fill="var(--textSec)" font-weight="600">${d.monthLabel}</text>`});
  h+=`<text x="12" y="90" text-anchor="middle" font-size="9" fill="var(--textSec)" font-weight="500" transform="rotate(-90,12,90)">% Cumplimiento</text></svg></div></div>`;

  // Trend line
  const cH=wide?220:180,pL=42,pR=16,pT=12,pB=30,plotH=cH-pT-pB;
  const plotW=Math.max(data.length*(wide?16:10),280),totalW=plotW+pL+pR;
  const xStep=plotW/Math.max(1,data.length-1);
  const yS=v=>pT+plotH-(v/100)*plotH;
  const maPath=data.map((d,i)=>`${i===0?"M":"L"} ${(pL+i*xStep).toFixed(1)} ${yS(d.ma7).toFixed(1)}`).join(" ");
  const areaPath=maPath+` L ${(pL+(data.length-1)*xStep).toFixed(1)} ${yS(0).toFixed(1)} L ${pL.toFixed(1)} ${yS(0).toFixed(1)} Z`;
  const lastX=pL+(data.length-1)*xStep,lastY=yS(data[data.length-1].ma7),lastVal=data[data.length-1].ma7;

  h+=`<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:2px">Tendencia (promedio 7 días)</div>
    <div style="font-size:11px;color:var(--textTer);margin-bottom:12px">Si la línea sube, vas mejorando. Si baja, estás cayendo.</div>
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--textSec)"><div style="width:16px;height:2px;background:#059669;border-radius:1px"></div>Promedio 7d</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--textSec)"><div style="width:16px;height:0;border-top:2px dashed #059669"></div>Meta 80%</div>
      <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--textSec)"><div style="width:8px;height:8px;border-radius:4px;background:rgba(5,150,105,0.2);border:1px solid rgba(5,150,105,0.4)"></div>Dato diario</div>
    </div>
    <div class="chart-scroll"><svg width="${totalW}" height="${cH}">`;
  [0,20,40,60,80,100].forEach(v=>{h+=`<line x1="${pL}" y1="${yS(v)}" x2="${totalW-pR}" y2="${yS(v)}" stroke="rgba(0,0,0,0.05)"/><text x="${pL-4}" y="${yS(v)+3}" text-anchor="end" font-size="9" fill="var(--textTer)">${v}%</text>`});
  h+=`<line x1="${pL}" y1="${yS(80)}" x2="${totalW-pR}" y2="${yS(80)}" stroke="#059669" stroke-dasharray="6 3" stroke-width="1.5"/>`;
  h+=`<line x1="${pL}" y1="${yS(60)}" x2="${totalW-pR}" y2="${yS(60)}" stroke="#D97706" stroke-dasharray="4 4" stroke-width="1"/>`;
  h+=`<path d="${areaPath}" fill="rgba(5,150,105,0.08)"/>`;
  data.forEach((d,i)=>{const cx=pL+i*xStep,cy=yS(d.pct);h+=`<circle cx="${cx}" cy="${cy}" r="${wide?3:2.5}" fill="${d.pct>=80?"rgba(5,150,105,0.3)":d.pct>=60?"rgba(217,119,6,0.3)":"rgba(220,38,38,0.25)"}" stroke="${d.pct>=80?"rgba(5,150,105,0.5)":d.pct>=60?"rgba(217,119,6,0.5)":"rgba(220,38,38,0.4)"}" stroke-width="0.5"/>`});
  h+=`<path d="${maPath}" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  h+=`<circle cx="${lastX}" cy="${lastY}" r="4" fill="#059669" stroke="#fff" stroke-width="2"/><rect x="${lastX+6}" y="${lastY-10}" width="36" height="20" rx="4" fill="#059669"/><text x="${lastX+24}" y="${lastY+4}" text-anchor="middle" font-size="10" fill="#fff" font-weight="700">${lastVal}%</text>`;
  data.forEach((d,i)=>{const x=pL+i*xStep;if(d.isFirst||i===0||i===data.length-1||i%(wide?5:7)===0)h+=`<text x="${x}" y="${cH-6}" text-anchor="middle" font-size="8" fill="var(--textTer)">${d.dayNum}${d.isFirst||i===0?" "+d.monthLabel:""}</text>`});
  h+=`<text x="12" y="${pT+plotH/2}" text-anchor="middle" font-size="9" fill="var(--textSec)" font-weight="500" transform="rotate(-90,12,${pT+plotH/2})">Promedio 7d</text>`;
  h+=`</svg></div></div>`;

  // Weekly scorecard
  h+=`<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:2px">Resumen semanal</div><div style="font-size:11px;color:var(--textTer);margin-bottom:14px">Promedio por semana y días ≥80%.</div>`;
  weeks.forEach(w=>{
    const bg=w.avg>=80?"rgba(5,150,105,0.06)":w.avg>=60?"rgba(217,119,6,0.06)":"rgba(220,38,38,0.04)";
    const bd=w.avg>=80?"rgba(5,150,105,0.15)":w.avg>=60?"rgba(217,119,6,0.15)":"rgba(220,38,38,0.1)";
    h+=`<div class="week-card" style="background:${bg};border:1px solid ${bd}">
      <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${w.range}</div><div style="font-size:10px;color:var(--textTer);margin-top:2px">${w.daysGreen}/${w.total} días ≥80%</div></div>
      <div style="width:${wide?120:80}px;flex-shrink:0"><div class="week-bar-outer"><div class="week-bar-inner" style="background:${barColor(w.avg)};width:${w.avg}%"></div></div></div>
      <div style="font-size:16px;font-weight:700;min-width:44px;text-align:right;color:${barColor(w.avg)}">${w.avg}%</div>
    </div>`;
  });
  h+=`</div></div>`;
  return h;
}

// ═══════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════
function changeDate(off){
  const d=parseDate(state.selectedDate);d.setDate(d.getDate()+off);
  setState({selectedDate:fmt(d)});
}
function calNav(dir){
  const{calMode}=state;
  if(calMode==="month"){let m=state.calMonth+dir,y=state.calYear;if(m<0){m=11;y--}if(m>11){m=0;y++}setState({calMonth:m,calYear:y})}
  else if(calMode==="quarter"){let q=state.calQuarter+dir,y=state.calYear;if(q<1){q=4;y--}if(q>4){q=1;y++}setState({calQuarter:q,calYear:y})}
  else setState({calYear:state.calYear+dir});
}
function toggleHabit(hid){
  const{completions,selectedDate}=state;
  const dd={...(completions[selectedDate]||{})};
  dd[hid]=!dd[hid];
  const next={...completions,[selectedDate]:dd};
  state.completions=next;save("ht-completions",next);render();
}
function openAdd(sec){setState({modal:{type:"add",section:sec}});showModal()}
function openEdit(hid){const h=state.habits.find(x=>x.id===hid);if(h)setState({modal:{type:"edit",habit:h}});showModal()}
function deleteHabit(hid){
  const h=state.habits.find(x=>x.id===hid);
  if(h&&confirm(`¿Eliminar "${h.name}"?`)){
    const n=state.habits.filter(x=>x.id!==hid);
    state.habits=n;save("ht-habits",n);render();
  }
}
function showModal(){
  const{modal}=state;if(!modal)return;
  const isAdd=modal.type==="add";
  const ov=document.createElement("div");ov.className="modal-overlay";ov.id="modal-overlay";
  ov.onclick=e=>{if(e.target===ov)closeModal()};
  const secLabel=isAdd?`${SECTIONS[modal.section].icon} ${SECTIONS[modal.section].label}`:"";
  ov.innerHTML=`<div class="modal-box">
    <div class="modal-title">${isAdd?`Nuevo hábito — ${secLabel}`:"Editar hábito"}</div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="m-emoji" class="modal-input emoji" value="${isAdd?"✅":modal.habit.emoji}">
      <input id="m-name" class="modal-input" placeholder="Nombre del hábito" value="${isAdd?"":modal.habit.name}" style="flex:1">
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" onclick="saveModal()">${isAdd?"Agregar":"Guardar"}</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById("m-name").focus(),100);
}
function closeModal(){const ov=document.getElementById("modal-overlay");if(ov)ov.remove();state.modal=null}
function saveModal(){
  const name=document.getElementById("m-name").value.trim();
  const emoji=document.getElementById("m-emoji").value||"✅";
  if(!name)return;
  const{modal,habits}=state;
  if(modal.type==="add"){
    const order=habits.filter(x=>x.section===modal.section).length;
    const n=[...habits,{id:genId(),name,emoji,section:modal.section,order}];
    state.habits=n;save("ht-habits",n);
  }else{
    const n=habits.map(h=>h.id===modal.habit.id?{...h,name,emoji}:h);
    state.habits=n;save("ht-habits",n);
  }
  closeModal();render();
}

// ═══ INIT ═══
render();
window.addEventListener("resize",render);

// ═══════════════════════════════════════════
// SERVICE WORKER (inline)
// ═══════════════════════════════════════════
if("serviceWorker" in navigator){
  const swCode=`
    const CACHE="gh-v1";
    const URLS=["/"];
    self.addEventListener("install",e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS)));self.skipWaiting()});
    self.addEventListener("activate",e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));self.clients.claim()});
    self.addEventListener("fetch",e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.status===200){const c=res.clone();caches.open(CACHE).then(ca=>ca.put(e.request,c))}return res}).catch(()=>caches.match("/"))))});
  `;
  const blob=new Blob([swCode],{type:"application/javascript"});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
